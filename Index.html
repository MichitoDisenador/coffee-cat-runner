<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Coffee Cat Runner | Michito Diseñador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        
        <div class="score-board">
            <span>Puntuación: <span id="score">0</span></span>
            <span>Récord: <span id="highScore">0</span></span>
        </div>
        
        <div class="controls-info">
            <span>⬆️ Espacio / Click / Tap para saltar</span>
        </div>
        
        <div class="social-footer">
            <a href="https://github.com/michitodisenador" target="_blank" rel="noopener noreferrer">
                <img src="assets/github-icon.svg" alt="GitHub">
            </a>
            <a href="https://www.facebook.com/michitodisenador" target="_blank" rel="noopener noreferrer">
                <img src="assets/facebook-icon.svg" alt="Facebook">
            </a>
            <a href="https://www.linkedin.com/in/michitodisenador" target="_blank" rel="noopener noreferrer">
                <img src="assets/linkedin-icon.svg" alt="LinkedIn">
            </a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
