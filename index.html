<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Coffee Cat Runner | Michito Diseñador</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- Logo grande arriba -->
        <div class="logo-header">
            <img src="logo.webp" alt="Michito Diseñador" class="brand-logo" id="brandLogo">
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="300"></canvas>
            
            <div class="score-board">
                <span>PUNTUACIÓN: <span id="score">0</span></span>
                <span>RÉCORD: <span id="highScore">0</span></span>
            </div>
            
            <div class="controls-info">
                <span>ESPACIO / CLICK / TAP para saltar</span>
            </div>
            
            <div class="social-footer">
                <a href="https://github.com/michitodisenador" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.facebook.com/michitodisenador" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="https://www.linkedin.com/in/michitodisenador" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-linkedin"></i>
                </a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
